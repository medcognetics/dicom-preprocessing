version: 2.1

orbs:
    win: circleci/windows@5.0

jobs:
    rust_quality:
        docker:
            - image: rust:latest
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v4-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v4-rust-deps-{{ arch }}-
            - restore_cache:
                keys:
                  - v4-rust-quality-target-{{ arch }}-{{ checksum "Cargo.lock" }}
            - run:
                name: Install dependencies
                command: rustup component add rustfmt clippy
            - run:
                name: Check formatting
                command: cargo fmt -- --check
            - run:
                name: Clippy check
                command: cargo clippy --workspace --all-features -- -D warnings
            - save_cache:
                key: v4-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo/registry
                  - ~/.cargo/git
            - save_cache:
                key: v4-rust-quality-target-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ./target

    python_quality:
        docker:
            - image: cimg/python:3.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v3-py-{{ checksum "uv.lock" }}
                  - v3-py-
            - run:
                name: Install dependencies
                command: make init-no-project
            - save_cache:
                key: v3-py-{{ checksum "uv.lock" }}
                paths:
                  - ~/.cache/pip
                  - ~/.cache/uv
            - run:
                name: Run Python quality checks
                command: make quality-python

    node_quality:
        docker:
            - image: cimg/node:24.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v2-node-{{ checksum "bindings/node/package-lock.json" }}
                  - v2-node-
            - run:
                name: Install Node dependencies
                command: make init-node
            - save_cache:
                key: v2-node-{{ checksum "bindings/node/package-lock.json" }}
                paths:
                  - ~/.npm
            - run:
                name: Run Node quality checks
                command: make quality-node

    rust_tests:
        docker:
            - image: rust:latest
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v4-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v4-rust-deps-{{ arch }}-
            - run:
                name: Install Python runtime for pyo3 tests
                command: apt-get update && apt-get install -y python3-dev
            - run:
                name: Run Rust tests
                command: cargo test --workspace --all-features

    python_tests:
        docker:
            - image: cimg/python:3.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v4-python-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v4-python-rust-deps-{{ arch }}-
            - restore_cache:
                keys:
                  - v3-py-{{ checksum "uv.lock" }}
                  - v3-py-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Version information
                command: rustc --version; cargo --version; rustup --version; uv --version
            - run:
                name: Install dependencies
                command: make init-no-project
            - run:
                name: Run Python tests
                command: make test-python-ci
            - save_cache:
                key: v4-python-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo/registry
                  - ~/.cargo/git

    node_tests:
        docker:
            - image: cimg/node:24.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v2-node-{{ checksum "bindings/node/package-lock.json" }}
                  - v2-node-
            - restore_cache:
                keys:
                  - v4-node-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v4-node-rust-deps-{{ arch }}-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Install Node dependencies
                command: make init-node
            - run:
                name: Run Node tests
                command: make test-node
            - save_cache:
                key: v4-node-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo/registry
                  - ~/.cargo/git

    windows_node_tests:
        executor: win/server-2022
        steps:
            - checkout
            - run:
                  name: Keep public GitHub dependencies on HTTPS
                  command: |
                      $rewriteRules = @(git config --global --get-regexp '^url\..*\.insteadof$' 2>$null)
                      if (($LASTEXITCODE -ne 0) -and ($LASTEXITCODE -ne 1)) {
                          throw "Unable to inspect global Git URL rewrites"
                      }
                      foreach ($rule in $rewriteRules) {
                          $name, $value = $rule -split '\s+', 2
                          if ($value -match '^https://github\.com/?$') {
                              git config --global --unset-all $name
                              if ($LASTEXITCODE -ne 0) {
                                  throw "Unable to remove Git URL rewrite '$name'"
                              }
                          }
                      }
                      exit 0
            - restore_cache:
                  keys:
                    - v4-windows-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                    - v4-windows-rust-deps-{{ arch }}-
            - run:
                  name: Install Rust
                  command: |
                      Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
                      .\rustup-init.exe -y --default-toolchain stable
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      rustc --version
                      cargo --version
            - run:
                  name: Install Node dependencies
                  command: |
                      npm --prefix bindings/node ci
            - run:
                  name: Test Windows file identifiers
                  command: |
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      $rustTargetLine = rustc -vV | Select-String '^host: '
                      if ($null -eq $rustTargetLine) {
                          throw "Unable to detect the Rust host target"
                      }
                      $rustTarget = $rustTargetLine.Line.Substring(6)
                      cargo test -p dicom-preprocessing --lib file::tests::test_inode_sort --target $rustTarget
            - run:
                  name: Build Node bindings
                  command: |
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      $nodeBuild = if ($env:CIRCLE_TAG -match '^v[0-9]+\.[0-9]+\.[0-9]+$') {
                          "build"
                      } else {
                          "build:debug"
                      }
                      npm --prefix bindings/node run $nodeBuild
            - save_cache:
                  key: v4-windows-rust-deps-{{ arch }}-{{ checksum "Cargo.lock" }}
                  paths:
                    - 'C:\Users\circleci\.cargo\registry'
                    - 'C:\Users\circleci\.cargo\git'

workflows:
    build_and_test:
        jobs:
            - rust_quality:
                filters: &version_tags
                    tags:
                        only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            - python_quality:
                filters: *version_tags
            - rust_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
                filters: *version_tags
            - python_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
                filters: *version_tags
            - node_quality:
                filters: *version_tags
            - node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
                filters: *version_tags
            - windows_node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
                filters: *version_tags
