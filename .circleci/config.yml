version: 2.1

orbs:
    macos: circleci/macos@2.5.4
    win: circleci/windows@5.0

jobs:
    rust_quality:
        docker:
            - image: rust:latest
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v3-rust-quality-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v3-rust-quality-{{ arch }}-
            - run:
                name: Install dependencies
                command: rustup component add rustfmt clippy
            - run:
                name: Check formatting
                command: cargo fmt -- --check
            - run:
                name: Clippy check
                command: cargo clippy --workspace --all-features -- -D warnings
            - save_cache:
                key: v3-rust-quality-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo
                  - ~/.rustup
                  - ./target
            - persist_to_workspace:
                root: .
                paths:
                  - target/

    python_quality:
        docker:
            - image: cimg/python:3.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v3-py-{{ checksum "uv.lock" }}
                  - v3-py-
            - run:
                name: Install dependencies
                command: make init-no-project
            - save_cache:
                key: v3-py-{{ checksum "uv.lock" }}
                paths:
                  - ~/.cache/pip
                  - ~/.cache/uv
            - run:
                name: Run Python quality checks
                command: make quality-python

    node_quality:
        docker:
            - image: cimg/node:24.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v2-node-{{ checksum "package-lock.json" }}
                  - v2-node-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Install Node dependencies
                command: make init-node
            - save_cache:
                key: v2-node-{{ checksum "package-lock.json" }}
                paths:
                  - ~/.npm
                  - node_modules
            - run:
                name: Run Node quality checks
                command: make quality-node

    rust_tests:
        docker:
            - image: rust:latest
        steps:
            - checkout
            - attach_workspace:
                at: .
            - restore_cache:
                keys:
                  - v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v3-rust-tests-{{ arch }}-
            - run:
                name: Install Python runtime for pyo3 tests
                command: apt-get update && apt-get install -y python3-dev
            - run:
                name: Run Rust tests
                command: cargo test --workspace --all-features
            - save_cache:
                key: v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo
                  - ~/.rustup
                  - ./target

    python_tests:
        docker:
            - image: cimg/python:3.13
        steps:
            - checkout
            - attach_workspace:
                at: .
            - restore_cache:
                keys:
                  - v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v3-rust-tests-{{ arch }}-
            - restore_cache:
                keys:
                  - v3-py-{{ checksum "uv.lock" }}
                  - v3-py-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Version information
                command: rustc --version; cargo --version; rustup --version; uv --version
            - run:
                name: Install dependencies
                command: make init-no-project
            - save_cache:
                key: v3-py-{{ checksum "uv.lock" }}
                paths:
                  - ~/.cache/pip
                  - ~/.cache/uv
            - run:
                name: Run Python tests
                command: make test-python-ci
            - save_cache:
                key: v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo
                  - ~/.rustup
                  - ./target

    node_tests:
        docker:
            - image: cimg/node:24.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v2-node-{{ checksum "package-lock.json" }}
                  - v2-node-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Install Node dependencies
                command: make init-node
            - save_cache:
                key: v2-node-{{ checksum "package-lock.json" }}
                paths:
                  - ~/.npm
                  - node_modules
            - run:
                name: Run Node tests
                command: |
                    export DICOM_PREPROCESSING_GIT_URL="git+https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
                    export DICOM_PREPROCESSING_GIT_SHA="$CIRCLE_SHA1"
                    make test-node

    windows_node_tests:
        executor: win/server-2022
        steps:
            - checkout
            - run:
                  name: Keep public GitHub dependencies on HTTPS
                  command: |
                      $rewriteRules = @(git config --global --get-regexp '^url\..*\.insteadof$' 2>$null)
                      if (($LASTEXITCODE -ne 0) -and ($LASTEXITCODE -ne 1)) {
                          throw "Unable to inspect global Git URL rewrites"
                      }
                      foreach ($rule in $rewriteRules) {
                          $name, $value = $rule -split '\s+', 2
                          if ($value -match '^https://github\.com/?$') {
                              git config --global --unset-all $name
                              if ($LASTEXITCODE -ne 0) {
                                  throw "Unable to remove Git URL rewrite '$name'"
                              }
                          }
                      }
                      exit 0
            - run:
                  name: Install Rust
                  command: |
                      Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
                      .\rustup-init.exe -y --default-toolchain stable
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      rustc --version
                      cargo --version
            - run:
                  name: Build and test Node bindings
                  command: |
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      npm ci --ignore-scripts
                      cargo test -p dicom-preprocessing test_inode_sort
                      npm run build
                      $env:DICOM_PREPROCESSING_GIT_URL = "git+https://github.com/$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME.git"
                      $env:DICOM_PREPROCESSING_GIT_SHA = $env:CIRCLE_SHA1
                      npm run test:git-install

    macos_arm64_node_tests:
        macos:
            xcode: 16.4.0
        resource_class: m4pro.medium
        environment:
            HOMEBREW_NO_AUTO_UPDATE: 1
        steps:
            - checkout
            - run:
                  name: Install Node and Rust
                  command: |
                      nvm install 24.13.0
                      nvm alias default 24.13.0
                      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.89.0
                      echo 'export NVM_DIR="$HOME/.nvm"' >> "$BASH_ENV"
                      echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> "$BASH_ENV"
                      echo 'nvm use 24.13.0 >/dev/null' >> "$BASH_ENV"
                      echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"
            - run:
                  name: Test commit-pinned Git installation
                  command: |
                      test "$(node -p process.arch)" = arm64
                      export DICOM_PREPROCESSING_GIT_URL="git+https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
                      export DICOM_PREPROCESSING_GIT_SHA="$CIRCLE_SHA1"
                      npm run test:git-install

    macos_x64_node_tests:
        macos:
            xcode: 16.4.0
        resource_class: m4pro.medium
        environment:
            HOMEBREW_NO_AUTO_UPDATE: 1
        steps:
            - checkout
            - macos/install-rosetta
            - run:
                  name: Install x64 Node and Rust
                  command: |
                      arch -x86_64 /bin/bash -lc '
                        export NVM_DIR="$HOME/.nvm"
                        source "$NVM_DIR/nvm.sh"
                        nvm install 24.13.0
                        nvm alias default 24.13.0
                        curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.89.0 --default-host x86_64-apple-darwin
                      '
            - run:
                  name: Test x64 commit-pinned Git installation
                  command: |
                      arch -x86_64 /bin/bash -lc '
                        export NVM_DIR="$HOME/.nvm"
                        source "$NVM_DIR/nvm.sh"
                        nvm use 24.13.0
                        source "$HOME/.cargo/env"
                        test "$(node -p process.arch)" = x64
                        export DICOM_PREPROCESSING_GIT_URL="git+https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
                        export DICOM_PREPROCESSING_GIT_SHA="$CIRCLE_SHA1"
                        npm run test:git-install
                      '

workflows:
    build_and_test:
        jobs:
            - rust_quality
            - python_quality
            - rust_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - python_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - node_quality
            - node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - windows_node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - macos_arm64_node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - macos_x64_node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
