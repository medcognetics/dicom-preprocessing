version: 2.1

# macOS x64 remains here temporarily. Migrate it separately to a native Intel
# GitHub-hosted runner.
parameters:
    run_cross_platform:
        type: boolean
        default: false

orbs:
    macos: circleci/macos@2.5.4

jobs:
    macos_x64_node_tests:
        macos:
            xcode: 16.4.0
        resource_class: m4pro.medium
        environment:
            HOMEBREW_NO_AUTO_UPDATE: 1
        steps:
            - checkout
            - macos/install-rosetta
            - run:
                  name: Install x64 Node and Rust
                  command: |
                      arch -x86_64 /bin/bash -lc '
                        export NVM_DIR="$HOME/.nvm"
                        source "$NVM_DIR/nvm.sh"
                        nvm install 24.13.0
                        nvm alias default 24.13.0
                        curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.89.0 --default-host x86_64-apple-darwin
                      '
            - run:
                  name: Test x64 commit-pinned Git installation
                  command: |
                      arch -x86_64 /bin/bash -lc '
                        export NVM_DIR="$HOME/.nvm"
                        source "$NVM_DIR/nvm.sh"
                        nvm use 24.13.0
                        source "$HOME/.cargo/env"
                        test "$(node -p process.arch)" = x64
                        export DICOM_PREPROCESSING_GIT_URL="git+https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
                        export DICOM_PREPROCESSING_GIT_SHA="$CIRCLE_SHA1"
                        npm run test:git-install
                      '

workflows:
    cross_platform:
        when: << pipeline.parameters.run_cross_platform >>
        jobs:
            - macos_x64_node_tests

    release_cross_platform:
        jobs:
            - macos_x64_node_tests:
                filters:
                    branches:
                        ignore: /.*/
                    tags:
                        only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
