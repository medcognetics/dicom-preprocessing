version: 2.1

orbs:
    win: circleci/windows@5.0

jobs:
    rust_quality:
        docker:
            - image: rust:latest
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v3-rust-quality-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v3-rust-quality-{{ arch }}-
            - run:
                name: Install dependencies
                command: rustup component add rustfmt clippy
            - run:
                name: Check formatting
                command: cargo fmt -- --check
            - run:
                name: Clippy check
                command: cargo clippy --workspace --all-features -- -D warnings
            - save_cache:
                key: v3-rust-quality-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo
                  - ~/.rustup
                  - ./target
            - persist_to_workspace:
                root: .
                paths:
                  - target/

    python_quality:
        docker:
            - image: cimg/python:3.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v3-py-{{ checksum "uv.lock" }}
                  - v3-py-
            - run:
                name: Install dependencies
                command: make init-no-project
            - save_cache:
                key: v3-py-{{ checksum "uv.lock" }}
                paths:
                  - ~/.cache/pip
                  - ~/.cache/uv
            - run:
                name: Run Python quality checks
                command: make quality-python

    node_quality:
        docker:
            - image: cimg/node:24.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v1-node-{{ checksum "bindings/node/package-lock.json" }}
                  - v1-node-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Install Node dependencies
                command: make init-node
            - save_cache:
                key: v1-node-{{ checksum "bindings/node/package-lock.json" }}
                paths:
                  - ~/.npm
                  - bindings/node/node_modules
            - run:
                name: Run Node quality checks
                command: make quality-node

    rust_tests:
        docker:
            - image: rust:latest
        steps:
            - checkout
            - attach_workspace:
                at: .
            - restore_cache:
                keys:
                  - v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v3-rust-tests-{{ arch }}-
            - run:
                name: Install Python runtime for pyo3 tests
                command: apt-get update && apt-get install -y python3-dev
            - run:
                name: Run Rust tests
                command: cargo test --workspace --all-features
            - save_cache:
                key: v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo
                  - ~/.rustup
                  - ./target

    python_tests:
        docker:
            - image: cimg/python:3.13
        steps:
            - checkout
            - attach_workspace:
                at: .
            - restore_cache:
                keys:
                  - v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                  - v3-rust-tests-{{ arch }}-
            - restore_cache:
                keys:
                  - v3-py-{{ checksum "uv.lock" }}
                  - v3-py-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Version information
                command: rustc --version; cargo --version; rustup --version; uv --version
            - run:
                name: Install dependencies
                command: make init-no-project
            - save_cache:
                key: v3-py-{{ checksum "uv.lock" }}
                paths:
                  - ~/.cache/pip
                  - ~/.cache/uv
            - run:
                name: Run Python tests
                command: make test-python-ci
            - save_cache:
                key: v3-rust-tests-{{ arch }}-{{ checksum "Cargo.lock" }}
                paths:
                  - ~/.cargo
                  - ~/.rustup
                  - ./target

    node_tests:
        docker:
            - image: cimg/node:24.13
        steps:
            - checkout
            - restore_cache:
                keys:
                  - v1-node-{{ checksum "bindings/node/package-lock.json" }}
                  - v1-node-
            - run:
                name: Install Rust
                command: |
                    if [ ! -f "$HOME/.cargo/env" ]; then
                        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    fi
                    echo 'source "$HOME/.cargo/env"' >> $BASH_ENV
            - run:
                name: Install Node dependencies
                command: make init-node
            - save_cache:
                key: v1-node-{{ checksum "bindings/node/package-lock.json" }}
                paths:
                  - ~/.npm
                  - bindings/node/node_modules
            - run:
                name: Run Node tests
                command: make test-node

    windows_node_tests:
        executor: win/server-2022
        steps:
            - checkout
            - run:
                  name: Keep public GitHub dependencies on HTTPS
                  command: |
                      $rewriteRules = @(git config --global --get-regexp '^url\..*\.insteadof$' 2>$null)
                      if (($LASTEXITCODE -ne 0) -and ($LASTEXITCODE -ne 1)) {
                          throw "Unable to inspect global Git URL rewrites"
                      }
                      foreach ($rule in $rewriteRules) {
                          $name, $value = $rule -split '\s+', 2
                          if ($value -match '^https://github\.com/?$') {
                              git config --global --unset-all $name
                              if ($LASTEXITCODE -ne 0) {
                                  throw "Unable to remove Git URL rewrite '$name'"
                              }
                          }
                      }
                      exit 0
            - run:
                  name: Install Rust
                  command: |
                      Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
                      .\rustup-init.exe -y --default-toolchain stable
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      rustc --version
                      cargo --version
            - run:
                  name: Build and test Node bindings
                  command: |
                      $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                      npm --prefix bindings/node ci
                      cargo test -p dicom-preprocessing test_inode_sort
                      npm --prefix bindings/node run build

workflows:
    build_and_test:
        jobs:
            - rust_quality
            - python_quality
            - rust_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - python_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - node_quality
            - node_tests:
                requires:
                    - rust_quality
                    - python_quality
                    - node_quality
            - windows_node_tests
